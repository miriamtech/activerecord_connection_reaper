name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.4.9'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: ./bin/appraise

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: rubygems

    # Only deploy if running on master
    if: github.ref == 'refs/heads/master'

    permissions:
      id-token: write # Required for trusted publishing
      contents: write # Required to push tags

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install semantic release
        run: npm install semantic-release@25 @webhippie/semantic-release-rubygem@7

      # Setup credentials using trusted publishing (ephemeral access via OIDC)
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # This is v2.0.0

      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
